<!-- HEADER -->
<div class="dialog-header">
  <mat-icon>person</mat-icon>
  {{ form.value.id ? 'Editar Usuario' : 'Nuevo Usuario' }}
</div>

<!-- CONTENT -->
<div mat-dialog-content class="card form-card">
  <form [formGroup]="form" class="form-layout" autocomplete="off">
    <!-- RUT -->
    <div class="form-field col-1">
      <label>RUT *</label>
      <mat-form-field appearance="outline">
        <input
          matInput
          formControlName="rut"
          [readonly]="!!data?.id"
          (input)="formatRut($event)"
          (blur)="validarRutBlur()"
        />
        <mat-error *ngIf="form.get('rut')?.hasError('duplicado')"> </mat-error>
      </mat-form-field>
    </div>

    <!-- NOMBRE -->
    <div class="form-field col-1">
      <label>Nombre *</label>
      <mat-form-field appearance="outline">
        <input
          matInput
          formControlName="firstName"
          (blur)="onBlurNombre('firstName')"
        />
      </mat-form-field>
    </div>

    <!-- SEGUNDO NOMBRE -->
    <div class="form-field col-1">
      <label>Segundo Nombre</label>
      <mat-form-field appearance="outline">
        <input
          matInput
          formControlName="secondName"
          (blur)="onBlurNombre('secondName')"
        />
      </mat-form-field>
    </div>

    <!-- APELLIDO PATERNO -->
    <div class="form-field col-1">
      <label>Apellido Paterno *</label>
      <mat-form-field appearance="outline">
        <input
          matInput
          formControlName="firstLastName"
          (blur)="onBlurNombre('firstLastName')"
        />
      </mat-form-field>
    </div>

    <!-- APELLIDO MATERNO -->
    <div class="form-field col-1">
      <label>Apellido Materno</label>
      <mat-form-field appearance="outline">
        <input
          matInput
          formControlName="secondLastName"
          (blur)="onBlurNombre('secondLastName')"
        />
      </mat-form-field>
    </div>

    <!-- FECHA DE NACIMIENTO -->
    <div class="form-field col-1">
      <label>Fecha de nacimiento</label>

      <mat-form-field appearance="outline">
        <input
          matInput
          formControlName="birth_date"
          [matDatepicker]="birthDatePicker"
          placeholder="dd/mm/aaaa"
          (dateChange)="onDateChange('birth_date', $event)"
        />

        <mat-datepicker-toggle
          matIconSuffix
          [for]="birthDatePicker"
        ></mat-datepicker-toggle>

        <mat-datepicker #birthDatePicker></mat-datepicker>
      </mat-form-field>
    </div>

    <!-- FECHA DE CONTRATO -->
    <div class="form-field col-1">
      <label>Fecha de contrato</label>

      <mat-form-field appearance="outline">
        <input
          matInput
          formControlName="contract_date"
          [matDatepicker]="contractDatePicker"
          placeholder="dd/mm/aaaa"
          (dateChange)="onDateChange('contract_date', $event)"
        />

        <mat-datepicker-toggle
          matIconSuffix
          [for]="contractDatePicker"
        ></mat-datepicker-toggle>

        <mat-datepicker #contractDatePicker></mat-datepicker>
      </mat-form-field>
    </div>

    <!-- CALIDAD CONTRACTUAL -->
    <div class="form-field col-2">
      <label>Calidad contractual</label>

      <mat-form-field appearance="outline">
        <mat-select formControlName="contract_type">
          <mat-option value=""> Sin información </mat-option>

          <mat-option *ngFor="let type of contractTypes" [value]="type">
            {{ type }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- USERNAME -->
    <div class="form-field col-2">
      <label>Username *</label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="username" />
      </mat-form-field>
    </div>

    <!-- EMAIL -->
    <div class="form-field col-2">
      <label>Email *</label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="email" (blur)="completarCorreo()" />
      </mat-form-field>
    </div>

    <!-- PASSWORD -->
    <div class="form-field col-2">
      <label>Password</label>

      <mat-form-field appearance="outline">
        <input
          matInput
          [type]="hide ? 'password' : 'text'"
          formControlName="password"
          autocomplete="new-password"
          [readonly]="!!data?.id && !allowPasswordUpdate"
        />

        <div matSuffix class="password-actions">
          <!-- EDITAR: habilitar cambio explícitamente -->
          <button
            *ngIf="data?.id && !allowPasswordUpdate"
            type="button"
            mat-icon-button
            (click)="enablePasswordChange()"
            title="Cambiar clave"
          >
            <mat-icon>lock_reset</mat-icon>
          </button>

          <!-- NUEVO USUARIO O CAMBIO HABILITADO -->
          <button
            *ngIf="!data?.id || allowPasswordUpdate"
            type="button"
            mat-icon-button
            (click)="hide = !hide"
            title="Mostrar u ocultar clave"
          >
            <mat-icon>{{ hide ? "visibility" : "visibility_off" }}</mat-icon>
          </button>

          <button
            *ngIf="!data?.id || allowPasswordUpdate"
            type="button"
            mat-icon-button
            class="btn-generate"
            (click)="generarClave()"
            title="Generar clave"
          >
            <mat-icon>vpn_key</mat-icon>
          </button>

          <button
            *ngIf="passwordGenerada"
            type="button"
            mat-icon-button
            (click)="copiarClave()"
            title="Copiar clave"
          >
            <mat-icon>content_copy</mat-icon>
          </button>
        </div>
      </mat-form-field>
    </div>

    <!-- ROLES -->
    <div class="form-field col-4">
      <label>Roles *</label>

      <div class="card roles-box">
        <mat-selection-list formControlName="roles">
          <mat-list-option
            *ngFor="let role of roles"
            [value]="role.id"
            class="role-option"
            [ngClass]="roleConfig[role.name]?.color"
          >
            <div class="role-content">
              <div class="role-left">
                <mat-icon [ngClass]="roleConfig[role.name]?.color">
                  {{ roleConfig[role.name]?.icon || 'person' }}
                </mat-icon>

                <span
                  class="role-name"
                  [ngClass]="roleConfig[role.name]?.color"
                >
                  {{ role.name }}
                </span>
              </div>
            </div>
          </mat-list-option>
        </mat-selection-list>
      </div>
    </div>
  </form>
</div>

<!-- ACTIONS -->
<div mat-dialog-actions class="toolbar">
  <button mat-button (click)="cancel()">Cancelar</button>

  <button class="btn-blue" (click)="save()" [disabled]="form.invalid">
    <mat-icon>save</mat-icon>
    Guardar
  </button>
</div>
