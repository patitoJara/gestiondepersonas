<!-- src/app/views/postulant/postulant-edit-dialog/postulant-edit-dialog.component.html -->

<h2 mat-dialog-title class="v2-header">
  <mat-icon>person</mat-icon>
  Editar datos del postulante
</h2>
<mat-dialog-content *ngIf="form">
  <div class="demand-v2 demand-layout v2">
    <div class="col-left">
      <div class="card card-blue">

        <form [formGroup]="form" class="inline-form-grid">

          <!-- FECHA + EDAD (MISMA FILA) -->
          <div class="field-line">
            <label>Fecha Nacimiento</label>
            <div class="date-input-wrapper">
              <input
                matInput
                [matDatepicker]="pickerNacimiento"
                formControlName="birthDate"
              />
              <mat-datepicker-toggle
                [for]="pickerNacimiento"
                class="date-toggle"
              ></mat-datepicker-toggle>
              <mat-datepicker #pickerNacimiento></mat-datepicker>
            </div>
          </div>

          <div class="field-line">
            <label>Edad</label>
            <div *ngIf="edad !== null" class="edad-info">
              <strong>{{ edad }} años</strong>
            </div>
          </div>

          <!-- NOMBRES (MISMA FILA) -->
          <div class="field-line">
            <label>Primer Nombre *</label>
            <input formControlName="firstName" />
          </div>

          <div class="field-line">
            <label>Segundo Nombre</label>
            <input formControlName="secondName" />
          </div>

          <!-- APELLIDOS (MISMA FILA) -->
          <div class="field-line">
            <label>Primer Apellido *</label>
            <input formControlName="firstLastName" />
          </div>

          <div class="field-line">
            <label>Segundo Apellido</label>
            <input formControlName="secondLastName" />
          </div>

          <!-- TELÉFONO SOLO -->
          <div class="field-line">
            <label>Teléfono</label>
            <input formControlName="phone" />
          </div>

          <!-- CORREO (FILA COMPLETA) -->
          <div class="field-line full-row">
            <label>Correo</label>
            <input formControlName="email" />
            <mat-error *ngIf="form.get('email')?.hasError('email')">
              Correo electrónico inválido
            </mat-error>

            <mat-error *ngIf="form.get('email')?.hasError('pattern')">
              Formato de correo no válido (ej: nombre&#64;dominio.cl)
            </mat-error>            
          </div>

          <!-- DIRECCIÓN (FILA COMPLETA) -->
          <div class="field-line full-row">
            <label>Dirección</label>
            <input formControlName="address" />
          </div>

          <!-- COMUNA + SEXO -->
          <div class="field-line">
            <label>Comuna</label>
            <select formControlName="commune">
              <option [ngValue]="null">—</option>
              <option *ngFor="let c of communes" [value]="c.id">
                {{ c.name }}
              </option>
            </select>
          </div>

          <div class="field-line">
            <label>Sexo</label>
            <select formControlName="sex">
              <option [ngValue]="null">—</option>
              <option *ngFor="let s of sexes" [value]="s.id">
                {{ s.name }}
              </option>
            </select>
          </div>

          <!-- PREVISIÓN -->
          <div class="field-line">
            <label>Tipo Previsión</label>
            <select formControlName="intPrev">
              <option [ngValue]="null">—</option>
              <option *ngFor="let p of intPrev" [value]="p.id">
                {{ p.name }}
              </option>
            </select>
          </div>

          <div class="field-line">
            <label>Previsión</label>
            <select formControlName="convPrev">
              <option *ngFor="let p of filteredConvPrev" [value]="p.id">
                {{ p.name }}
              </option>
            </select>
          </div>

        </form>

      </div>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-stroked-button color="warn" (click)="cancelar()">
    Cancelar
  </button>

  <button
    *ngIf="form"
    mat-flat-button
    color="primary"
    [disabled]="form.invalid"
    (click)="guardar()"
  >
    Guardar cambios
  </button>
</mat-dialog-actions>
