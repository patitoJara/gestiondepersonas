<div class="task-list-wrapper" style="position:relative;">

  <!-- Error -->
  <div *ngIf="error" class="error-banner" style="padding:12px;border-radius:8px;background:#fdecea;color:#b42318;margin-bottom:12px;">
    {{ error }}
  </div>

  <!-- Tabla -->
  <div style="overflow:auto;">
    <table mat-table [dataSource]="rows" class="mat-elevation-z1" style="width:100%; min-width:640px;">

      <!-- ID -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let row"> {{ row.id }} </td>
      </ng-container>

      <!-- Nombre/Título -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Nombre </th>
        <td mat-cell *matCellDef="let row">
          {{ row.name || row.title || '—' }}
        </td>
      </ng-container>

      <!-- createdAt -->
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef> Creado </th>
        <td mat-cell *matCellDef="let row">
          <ng-container *ngIf="row.createdAt as d; else dash">
            {{ d | date:'short' }}
          </ng-container>
          <ng-template #dash>—</ng-template>
        </td>
      </ng-container>

      <!-- Acciones -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button (click)="edit(row)" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="remove(row)" aria-label="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Header y filas -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row        *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <!-- Paginador -->
  <mat-paginator
    [length]="total"
    [pageIndex]="page"
    [pageSize]="size"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPage($event)"
    aria-label="Paginación de tareas">
  </mat-paginator>

  <!-- Loading overlay -->
  <div *ngIf="loading" style="
      position:absolute; inset:0; display:grid; place-items:center;
      background:rgba(255,255,255,.6); backdrop-filter:saturate(120%) blur(1px);">
    <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
  </div>
</div>
