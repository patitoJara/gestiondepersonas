<section>
  <div class="toolbar">
    <button mat-raised-button (click)="openDialog()">Nuevo</button>
    <form class="search-form" (ngSubmit)="findByNameContainingIgnoreCase(filterText)">
      <mat-form-field class="search-field">
        <mat-label>Buscar</mat-label>
        <input
          matInput
          placeholder="Ingrese texto para buscar"
          [(ngModel)]="filterText"
          name="filter"
        >
        <button
          mat-icon-button
          matSuffix
          aria-label="Search"
          (click)="findByNameContainingIgnoreCase(filterText)"
          type="button"
        >
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>
    </form>
  </div>
</section>
<mat-divider></mat-divider>


<br/>
<table mat-table *ngIf="projects?.length" [dataSource]="projects" class="mat-elevation-z8 padding-task-list">

  <!-- ID Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> # </th>
    <td mat-cell *matCellDef="let project"> {{project.id}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let project"> {{project.name}} </td>
  </ng-container>

  <!-- Description Column -->
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef> Description </th>
    <td mat-cell *matCellDef="let project"> {{project.description}} </td>
  </ng-container>



  <ng-container matColumnDef="state">
    <th mat-header-cell *matHeaderCellDef> State </th>
    <td mat-cell *matCellDef="let project"> {{project.state}} </td>
  </ng-container>

  <!-- Actions Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let project">
      <button mat-icon-button color="warn" (click)="eliminarProject(project.id)">
        <mat-icon>delete</mat-icon>
      </button>
      <button mat-icon-button color="primary" (click)="editDialog(project.id)">
        <mat-icon>edit</mat-icon>
      </button>
    </td>
  </ng-container>


  <!-- Definir las filas de encabezado y datos -->
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
