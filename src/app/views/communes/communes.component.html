<!-- src/app/pages/communes/communes.component.html -->

<h3 class="titulo-genero">
  <mat-icon>location_city</mat-icon>
  <span>Comunas</span>
</h3>

<!-- Toolbar: buscador + filtros + botón nuevo -->
<div class="list-toolbar">
  <!-- 🔍 Filtros -->
  <div class="filters">
    <!-- Campo de búsqueda -->
    <input
      #search
      type="text"
      placeholder="Buscar Comuna..."
      [value]="q"
      (keyup.enter)="applyFilter(search.value)" />

    <!-- Botones de filtro de estado -->
    <button [class.active]="filterState === 'active'" (click)="setState('active')">Activos</button>
    <button [class.active]="filterState === 'deleted'" (click)="setState('deleted')">Eliminados</button>
    <button [class.active]="filterState === 'all'" (click)="setState('all')">Todos</button>
  </div>

  <!-- ➕ Botón principal -->
  <div class="right-actions">
    <button mat-flat-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon>
      Nuevo Comuna
    </button>
  </div>
</div>

<!-- Loader -->
<mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

<!-- Tabla (con scroll horizontal si hay muchas columnas) -->
<div class="table-wrapper" style="overflow:auto;">
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z1" style="min-width:900px; width:100%;">

    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Id</th>
      <td mat-cell *matCellDef="let row">{{ row.id }}</td>
    </ng-container>

    <!-- Nombre -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <!-- Creado -->
    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Creado</th>
      <td mat-cell *matCellDef="let row">{{ row.createdAt || '—' }}</td>
    </ng-container>

    <!-- Actualizado -->
    <ng-container matColumnDef="updatedAt">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Actualizado</th>
      <td mat-cell *matCellDef="let row">{{ row.updatedAt || '—' }}</td>
    </ng-container>

    <!-- Eliminado -->
    <ng-container matColumnDef="deletedAt">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Eliminado</th>
      <td mat-cell *matCellDef="let row">{{ row.deletedAt || '—' }}</td>
    </ng-container>

    <!-- Estado (chip informativo) -->
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">
        <mat-chip [color]="row.deletedAt ? 'warn' : 'primary'" variant="outlined">
          {{ row.deletedAt ? 'Eliminado' : 'Activo' }}
        </mat-chip>
      </td>
    </ng-container>

    <!-- Acciones -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">  <!-- style="display:flex; gap:8px;"  -->
        <button mat-icon-button matTooltip="Editar" (click)="openDialog(row)">
          <mat-icon>edit</mat-icon>
        </button>

        <button *ngIf="!row.deletedAt"
                mat-icon-button color="warn" matTooltip="Eliminar"
                (click)="softDelete(row)">
          <mat-icon>delete</mat-icon>
        </button>

        <button *ngIf="row.deletedAt"
                mat-icon-button color="primary" matTooltip="Restaurar"
                (click)="restore(row)">
          <mat-icon>settings_backup_restore</mat-icon>
        </button>
      </td>
    </ng-container>

    <!-- Header y filas -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row        *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Fila sin datos -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" [attr.colspan]="displayedColumns.length">
        Sin resultados para "{{ q }}"
      </td>
    </tr>
  </table>
</div>

<!-- Paginador -->
<!-- Nota: no referenciamos a 'paginator' desde aquí para evitar warnings NG8107.
     Configura pageIndex/pageSize en el TS (ngAfterViewInit) o usa atributos estáticos -->
<mat-paginator
  [length]="total"
  pageSize="10"
  [pageSizeOptions]="[5,10,20]"
  showFirstLastButtons>
</mat-paginator>
