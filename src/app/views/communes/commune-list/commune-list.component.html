<!-- Divider superior -->
<mat-divider></mat-divider>

<!-- Mensaje de error -->
<div *ngIf="error" style="padding:12px;border-radius:8px;background:#fdecea;color:#b42318;margin:12px 0;">
  {{ error }}
</div>

<!-- Tabla -->
<div style="overflow:auto;">
  <table mat-table [dataSource]="rows" class="mat-elevation-z1" style="width:100%; min-width:640px;">

    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let row"> {{ row.id }} </td>
    </ng-container>

    <!-- Nombre -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let row">
        {{ row.name || '—' }}
      </td>
    </ng-container>

    <!-- Acciones -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button (click)="edit(row)" aria-label="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="remove(row)" aria-label="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <!-- Header y filas -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row        *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<!-- Paginador -->
<mat-paginator
  [length]="totalElements"
  [pageIndex]="pageIndex"
  [pageSize]="pageSize"
  [pageSizeOptions]="[5, 10, 20]"
  (page)="onPage($event)"
  aria-label="Paginación de comunas">
</mat-paginator>

<!-- Loading overlay -->
<div *ngIf="loading" style="
    position:fixed; inset:0; display:grid; place-items:center;
    background:rgba(255,255,255,.4); pointer-events:none;">
  <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
</div>
