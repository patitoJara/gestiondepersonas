<div style="text-align:center; padding:40px;">

  <h2>Servicio de Salud Magallanes</h2>
  <h3>Sistema Registro Teletrabajo</h3>

  <div style="margin-top:30px;">
    <div style="font-size:20px;">
      {{ now | date:'fullDate' }}
    </div>

    <div style="font-size:64px; font-weight:bold; margin-top:10px;">
      {{ now | date:'HH:mm:ss' }}
    </div>
  </div>

  <div style="margin-top:40px;">
    <button mat-raised-button color="primary"
            style="width:220px; height:60px; font-size:18px; margin-right:20px;"
            (click)="mark('ING')">
      MARCAR INGRESO
    </button>

    <button mat-raised-button color="warn"
            style="width:220px; height:60px; font-size:18px;"
            (click)="mark('SAL')">
      MARCAR SALIDA
    </button>
  </div>

  <div style="margin-top:50px; max-width:500px; margin-left:auto; margin-right:auto;">
    <h4>Eventos de Hoy</h4>

    <table style="width:100%; margin-top:15px;">
      <tr *ngFor="let e of todayEvents">
        <td>{{ e.datetime | date:'HH:mm:ss' }}</td>
        <td>{{ e.type }}</td>
        <td>{{ e.origin }}</td>
      </tr>
    </table>
  </div>

</div>
